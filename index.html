<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>📖 世界引擎 · 互动小说工坊</title>
  <style>
    /* ===== 基础重置 ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* ===== 壁纸主题 ===== */
    body {
      font-family: 'STKaiti', 'KaiTi', '楷体', 'PingFang SC', 'Microsoft YaHei', serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px;
      transition: background 0.8s ease, color 0.6s ease;
    }

    /* 主题1：水墨 */
    body.theme-shuimo {
      background: #f5f0e8;
      background-image: radial-gradient(ellipse at 30% 20%, #e8e0d4 0%, #d5cdc0 100%);
      color: #3a2e24;
    }
    body.theme-shuimo .game-container {
      background: #f8f2e8;
      border-color: #d5c8b8;
    }
    body.theme-shuimo .header { background: #f0e8dc; border-color: #d5c8b8; }
    body.theme-shuimo .status-panel { background: #f5eee4; border-color: #d5c8b8; }
    body.theme-shuimo .location-tag { background: #f5eee4; border-color: #d5c8b8; }
    body.theme-shuimo .messages { background: #f8f2e8; }
    body.theme-shuimo .input-area { background: #f8f2e8; border-color: #d5c8b8; }
    body.theme-shuimo .quick-actions { background: #f8f2e8; border-color: #e8e0d4; }
    body.theme-shuimo .memory-panel { background: #f5eee4; border-color: #d5c8b8; }
    body.theme-shuimo .modal-box { background: #f8f2e8; border-color: #d5c8b8; }
    body.theme-shuimo .header-title { color: #4a3a2e; }
    body.theme-shuimo .header-btn, body.theme-shuimo .mode-select { color: #6a5a4a; border-color: #c8bcae; }
    body.theme-shuimo .narr-msg { color: #3a2e24; }
    body.theme-shuimo .user-msg { color: #7a6a5a; }
    body.theme-shuimo .sys-msg { color: #8a7a6a; border-color: #d5c8b8; }

    /* 主题2：粉嫩 */
    body.theme-fennen {
      background: #fce4ec;
      background-image: radial-gradient(circle at 20% 30%, #ffd9e6 0%, #f8bbd0 100%);
      color: #5a3a4a;
    }
    body.theme-fennen .game-container {
      background: #fff5f7;
      border-color: #ffb6c9;
    }
    body.theme-fennen .header { background: linear-gradient(135deg, #ffb6c9, #ff8aab); border-color: #ff9eb5; }
    body.theme-fennen .status-panel { background: #fff0f3; border-color: #ffd9e6; }
    body.theme-fennen .location-tag { background: #ffecf0; border-color: #ffd9e6; }
    body.theme-fennen .messages { background: #fefafb; }
    body.theme-fennen .input-area { background: #fff5f7; border-color: #ffd9e6; }
    body.theme-fennen .quick-actions { background: #fff5f7; border-color: #ffecf0; }
    body.theme-fennen .memory-panel { background: #fff5f7; border-color: #ffd9e6; }
    body.theme-fennen .modal-box { background: #fff5f7; border-color: #ffb6c9; }
    body.theme-fennen .header-title { color: #fff; text-shadow: 0 2px 4px rgba(200,60,100,0.3); }
    body.theme-fennen .header-btn, body.theme-fennen .mode-select { color: #a04a5a; border-color: #ffd9e6; background: rgba(255,255,255,0.5); }
    body.theme-fennen .narr-msg { color: #4a2a32; background: #fff0f3; border-left-color: #ff8aab; }
    body.theme-fennen .user-msg { color: #fff; background: linear-gradient(135deg, #ff8aab, #ff6b8a); }
    body.theme-fennen .sys-msg { color: #a06a7a; border-color: #ffd9e6; background: #ffecf0; }

    /* 主题3：暗黑 */
    body.theme-anhei {
      background: #1a1218;
      background-image: radial-gradient(ellipse at 30% 20%, #2a1a22 0%, #0d080a 100%);
      color: #c8b8c0;
    }
    body.theme-anhei .game-container {
      background: #1a1016;
      border-color: #3a2a32;
    }
    body.theme-anhei .header { background: #221820; border-color: #3a2a32; }
    body.theme-anhei .status-panel { background: #1a1218; border-color: #3a2a32; }
    body.theme-anhei .location-tag { background: #1a1218; border-color: #3a2a32; }
    body.theme-anhei .messages { background: #1a1016; }
    body.theme-anhei .input-area { background: #1a1218; border-color: #3a2a32; }
    body.theme-anhei .quick-actions { background: #1a1218; border-color: #2a1a22; }
    body.theme-anhei .memory-panel { background: #1a1218; border-color: #3a2a32; }
    body.theme-anhei .modal-box { background: #221820; border-color: #3a2a32; }
    body.theme-anhei .header-title { color: #c8a8b8; }
    body.theme-anhei .header-btn, body.theme-anhei .mode-select { color: #9a8a92; border-color: #3a2a32; background: rgba(255,255,255,0.05); }
    body.theme-anhei .narr-msg { color: #d4c8d0; background: #22181e; border-left-color: #6a4a5a; }
    body.theme-anhei .user-msg { color: #f0e8ee; background: #3a2a32; border-color: #5a4a52; }
    body.theme-anhei .sys-msg { color: #8a7a82; border-color: #3a2a32; background: #1a1218; }

    /* 主题4：暖阳 */
    body.theme-nuanyang {
      background: #fdf6ed;
      background-image: radial-gradient(circle at 50% 30%, #fce8d4 0%, #f5dcc8 100%);
      color: #4a3a2e;
    }
    body.theme-nuanyang .game-container {
      background: #fef8f0;
      border-color: #e8d4c0;
    }
    body.theme-nuanyang .header { background: #f5e8d8; border-color: #e8d4c0; }
    body.theme-nuanyang .status-panel { background: #fcf2e8; border-color: #e8d4c0; }
    body.theme-nuanyang .location-tag { background: #fcf2e8; border-color: #e8d4c0; }
    body.theme-nuanyang .messages { background: #fef8f0; }
    body.theme-nuanyang .input-area { background: #fef8f0; border-color: #e8d4c0; }
    body.theme-nuanyang .quick-actions { background: #fef8f0; border-color: #f0e4d4; }
    body.theme-nuanyang .memory-panel { background: #fcf2e8; border-color: #e8d4c0; }
    body.theme-nuanyang .modal-box { background: #fef8f0; border-color: #e8d4c0; }
    body.theme-nuanyang .header-title { color: #6a4a3a; }
    body.theme-nuanyang .header-btn, body.theme-nuanyang .mode-select { color: #8a6a5a; border-color: #dcc8b8; }
    body.theme-nuanyang .narr-msg { color: #4a3a2e; background: #fdf4e8; border-left-color: #d4a88a; }
    body.theme-nuanyang .user-msg { color: #5a4a3e; background: #f5e4d4; border-color: #dcc8b8; }
    body.theme-nuanyang .sys-msg { color: #9a7a6a; border-color: #e8d4c0; background: #fcf2e8; }

    /* 主题5：星夜 */
    body.theme-xingye {
      background: #0c0818;
      background-image: radial-gradient(ellipse at 40% 20%, #1a1030 0%, #08040e 100%);
      color: #c8c0d8;
    }
    body.theme-xingye .game-container {
      background: #100c1a;
      border-color: #2a2040;
    }
    body.theme-xingye .header { background: #18102a; border-color: #2a2040; }
    body.theme-xingye .status-panel { background: #140c20; border-color: #2a2040; }
    body.theme-xingye .location-tag { background: #140c20; border-color: #2a2040; }
    body.theme-xingye .messages { background: #100c1a; }
    body.theme-xingye .input-area { background: #140c20; border-color: #2a2040; }
    body.theme-xingye .quick-actions { background: #140c20; border-color: #1a1030; }
    body.theme-xingye .memory-panel { background: #140c20; border-color: #2a2040; }
    body.theme-xingye .modal-box { background: #18102a; border-color: #2a2040; }
    body.theme-xingye .header-title { color: #c8b8e8; }
    body.theme-xingye .header-btn, body.theme-xingye .mode-select { color: #9a8aaa; border-color: #3a2a5a; background: rgba(255,255,255,0.05); }
    body.theme-xingye .narr-msg { color: #d8d0e8; background: #18102a; border-left-color: #6a4aaa; }
    body.theme-xingye .user-msg { color: #e8e0f0; background: #2a1a4a; border-color: #4a3a6a; }
    body.theme-xingye .sys-msg { color: #8a7aaa; border-color: #3a2a5a; background: #140c20; }

    /* 主题6：竹影 */
    body.theme-zhuying {
      background: #e8eee0;
      background-image: radial-gradient(circle at 30% 40%, #dce8d0 0%, #c8d8b8 100%);
      color: #3a4a32;
    }
    body.theme-zhuying .game-container {
      background: #f0f4e8;
      border-color: #b8c8a8;
    }
    body.theme-zhuying .header { background: #e8eee0; border-color: #b8c8a8; }
    body.theme-zhuying .status-panel { background: #ecf0e4; border-color: #b8c8a8; }
    body.theme-zhuying .location-tag { background: #ecf0e4; border-color: #b8c8a8; }
    body.theme-zhuying .messages { background: #f0f4e8; }
    body.theme-zhuying .input-area { background: #f0f4e8; border-color: #b8c8a8; }
    body.theme-zhuying .quick-actions { background: #f0f4e8; border-color: #d8e0cc; }
    body.theme-zhuying .memory-panel { background: #ecf0e4; border-color: #b8c8a8; }
    body.theme-zhuying .modal-box { background: #f0f4e8; border-color: #b8c8a8; }
    body.theme-zhuying .header-title { color: #4a5a3a; }
    body.theme-zhuying .header-btn, body.theme-zhuying .mode-select { color: #6a7a5a; border-color: #b8c8a8; }
    body.theme-zhuying .narr-msg { color: #3a4a32; background: #ecf4e4; border-left-color: #7a9a5a; }
    body.theme-zhuying .user-msg { color: #4a5a3e; background: #e4ecd8; border-color: #b8c8a8; }
    body.theme-zhuying .sys-msg { color: #8a9a7a; border-color: #b8c8a8; background: #ecf0e4; }

    /* ===== 游戏容器 ===== */
    .game-container {
      width: 100%;
      max-width: 600px;
      height: 96vh;
      max-height: 920px;
      display: flex;
      flex-direction: column;
      border-radius: 8px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.12);
      overflow: hidden;
      border: 1px solid;
      position: relative;
      transition: background 0.8s ease, border-color 0.6s ease;
    }

    /* ===== 顶栏 ===== */
    .header {
      padding: 10px 14px 8px;
      display: flex;
      align-items: center;
      gap: 6px;
      border-bottom: 1px solid;
      flex-wrap: wrap;
      flex-shrink: 0;
      transition: background 0.6s ease;
    }
    .header-title {
      font-size: 17px;
      font-weight: 400;
      letter-spacing: 2px;
      transition: color 0.6s ease;
    }
    .header-btns {
      margin-left: auto;
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      align-items: center;
    }
    .header-btn, .mode-select, .io-btn {
      font-size: 10px;
      padding: 3px 10px;
      border-radius: 4px;
      border: 1px solid;
      background: transparent;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      letter-spacing: 0.3px;
      outline: none;
    }
    .header-btn:active, .mode-select:active, .io-btn:active {
      transform: scale(0.95);
    }
    .mode-select {
      max-width: 110px;
    }

    /* ===== 状态面板 ===== */
    .status-panel {
      padding: 8px 14px;
      border-bottom: 1px solid;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2px 12px;
      flex-shrink: 0;
      transition: background 0.6s ease;
    }
    .status-item {
      font-size: 11px;
      letter-spacing: 0.5px;
    }
    .status-item span { font-weight: 600; }
    .status-bar {
      grid-column: 1 / -1;
      display: flex;
      flex-wrap: wrap;
      gap: 4px 12px;
      margin-top: 2px;
    }
    .bar-mini {
      flex: 1;
      min-width: 40px;
      font-size: 9px;
      letter-spacing: 0.3px;
    }
    .bar-track {
      height: 3px;
      border-radius: 2px;
      margin-top: 2px;
      overflow: hidden;
      background: rgba(0,0,0,0.08);
    }
    .bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.6s ease;
    }
    .bar-fill.sens { background: #5a7a8a; }
    .bar-fill.full { background: #6a7a5a; }
    .bar-fill.fluid { background: #8a7a5a; }
    .bar-fill.fatigue { background: #8a5a5a; }

    .location-tag {
      padding: 4px 14px;
      display: flex;
      gap: 12px;
      font-size: 11px;
      border-bottom: 1px solid;
      flex-shrink: 0;
      transition: background 0.6s ease;
    }
    .location-tag .loc { font-weight: 600; }
    .location-tag .mode { font-style: italic; }

    /* ===== 记忆面板 ===== */
    .memory-panel {
      display: none;
      padding: 10px 14px;
      border-bottom: 1px solid;
      max-height: 140px;
      overflow-y: auto;
      flex-shrink: 0;
      transition: background 0.6s ease;
    }
    .memory-panel.show { display: block; }
    .memory-section { margin-bottom: 6px; }
    .memory-label {
      font-size: 9px;
      letter-spacing: 1px;
      margin-bottom: 2px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 500;
    }
    .memory-edit {
      font-size: 9px;
      cursor: pointer;
      border: none;
      background: none;
    }
    .memory-text {
      font-size: 12px;
      line-height: 1.7;
      padding: 6px 12px;
      border-radius: 4px;
      border: 1px solid rgba(0,0,0,0.08);
      min-height: 16px;
      font-family: inherit;
      background: rgba(255,255,255,0.3);
    }
    .memory-text:empty::before { content: '📖 暂无记忆...'; opacity: 0.5; }
    .memory-counter { font-size: 8px; opacity: 0.6; }

    /* ===== 消息区域 ===== */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 14px 18px 10px;
      display: flex;
      flex-direction: column;
      gap: 0;
      scroll-behavior: smooth;
      transition: background 0.6s ease;
    }
    .messages::-webkit-scrollbar { width: 3px; }
    .messages::-webkit-scrollbar-thumb { border-radius: 2px; background: rgba(0,0,0,0.12); }

    .narr-msg {
      font-size: 15px;
      line-height: 2;
      padding: 0;
      margin: 0;
      background: transparent;
      border: none;
      white-space: pre-wrap;
      word-wrap: break-word;
      text-align: justify;
      letter-spacing: 0.5px;
      text-indent: 2em;
      max-width: 100%;
      align-self: stretch;
      transition: color 0.6s ease, background 0.6s ease, border-color 0.6s ease;
    }
    .user-msg {
      font-size: 15px;
      line-height: 2;
      padding: 0;
      margin: 6px 0 0 0;
      background: transparent;
      border: none;
      white-space: pre-wrap;
      word-wrap: break-word;
      text-align: justify;
      letter-spacing: 0.5px;
      font-style: italic;
      text-indent: 2em;
      max-width: 100%;
      align-self: stretch;
      transition: color 0.6s ease, background 0.6s ease;
    }
    .sys-msg {
      align-self: center;
      font-size: 11px;
      padding: 6px 0;
      border: none;
      max-width: 90%;
      text-align: center;
      letter-spacing: 1px;
      border-top: 1px solid;
      border-bottom: 1px solid;
      margin: 8px 0;
      width: 100%;
      transition: color 0.6s ease, border-color 0.6s ease, background 0.6s ease;
    }
    .memory-notice {
      align-self: center;
      font-size: 10px;
      padding: 4px 0;
      border: none;
      text-align: center;
      letter-spacing: 0.5px;
      font-style: italic;
      opacity: 0.7;
    }
    .divider-line {
      align-self: center;
      font-size: 12px;
      padding: 6px 0 4px;
      letter-spacing: 8px;
      text-align: center;
      width: 100%;
      border: none;
      opacity: 0.4;
    }
    .thinking-msg {
      font-size: 14px;
      line-height: 2;
      padding: 0;
      margin: 4px 0;
      background: transparent;
      border: none;
      white-space: pre-wrap;
      word-wrap: break-word;
      text-align: justify;
      letter-spacing: 0.5px;
      font-style: italic;
      text-indent: 2em;
      max-width: 100%;
      align-self: stretch;
      opacity: 0.6;
    }

    /* ===== 底部输入 ===== */
    .input-area {
      display: flex;
      padding: 8px 14px 12px;
      gap: 8px;
      border-top: 1px solid;
      flex-shrink: 0;
      transition: background 0.6s ease;
    }
    .input-area input {
      flex: 1;
      padding: 10px 16px;
      border: 1px solid rgba(0,0,0,0.1);
      border-radius: 4px;
      font-size: 14px;
      background: rgba(255,255,255,0.4);
      outline: none;
      font-family: inherit;
      transition: border 0.2s;
    }
    .input-area input::placeholder { opacity: 0.5; font-style: italic; }
    .input-area input:focus { border-color: rgba(0,0,0,0.3); }
    .send-btn {
      background: transparent;
      border: 1px solid rgba(0,0,0,0.12);
      font-size: 18px;
      width: 44px;
      height: 44px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: inherit;
    }
    .send-btn:active { transform: scale(0.92); opacity: 0.6; }
    .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .quick-actions {
      display: flex;
      gap: 4px;
      padding: 4px 14px 6px;
      flex-wrap: wrap;
      border-top: 1px solid;
      flex-shrink: 0;
      transition: background 0.6s ease;
    }
    .quick-btn {
      font-size: 10px;
      padding: 4px 12px;
      border-radius: 4px;
      border: 1px solid rgba(0,0,0,0.08);
      background: transparent;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.3px;
      transition: all 0.15s;
    }
    .quick-btn:active { transform: scale(0.95); opacity: 0.6; }

    /* ===== 模态框（通用） ===== */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(4px);
      z-index: 999;
      justify-content: center;
      align-items: center;
    }
    .modal-overlay.active { display: flex; }
    .modal-box {
      border-radius: 8px;
      max-width: 500px;
      width: 92%;
      padding: 22px 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      border: 1px solid;
      max-height: 85vh;
      overflow-y: auto;
      transition: background 0.6s ease, border-color 0.6s ease;
    }
    .modal-box h3 {
      font-size: 18px;
      font-weight: 400;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      letter-spacing: 2px;
    }
    .modal-box .close-btn {
      margin-left: auto;
      background: none;
      border: none;
      font-size: 22px;
      cursor: pointer;
    }
    .modal-box textarea {
      width: 100%;
      min-height: 120px;
      padding: 12px;
      border-radius: 4px;
      border: 1px solid rgba(0,0,0,0.1);
      font-family: inherit;
      font-size: 13px;
      line-height: 1.8;
      background: rgba(255,255,255,0.3);
      resize: vertical;
      outline: none;
    }
    .modal-box textarea:focus { border-color: rgba(0,0,0,0.3); }
    .modal-box .label-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    .modal-box .label-row span { font-size: 12px; opacity: 0.6; }
    .modal-box .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .modal-box .btn-row button {
      padding: 6px 16px;
      border-radius: 4px;
      border: 1px solid rgba(0,0,0,0.1);
      background: transparent;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      transition: all 0.15s;
    }
    .modal-box .btn-row button:active { transform: scale(0.95); }

    /* NPC列表 */
    .npc-list {
      margin-top: 8px;
      max-height: 200px;
      overflow-y: auto;
    }
    .npc-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 10px;
      border-radius: 4px;
      border: 1px solid rgba(0,0,0,0.06);
      margin-bottom: 4px;
      font-size: 13px;
    }
    .npc-item .npc-name { font-weight: 600; }
    .npc-item .npc-desc { opacity: 0.7; font-size: 12px; margin-left: 8px; }
    .npc-item .npc-del {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 16px;
      opacity: 0.4;
    }
    .npc-item .npc-del:hover { opacity: 1; }

    /* 主题选择器 */

      margin: 8px 0;

    @media (max-width: 500px) {

  </style>
</head>
<body>

<script>
  // ============================================================
//  🔑 API Key 管理
// ============================================================
let DEEPSEEK_API_KEY = '';

function getApiKey() {
  const saved = localStorage.getItem('deepseek_api_key');
  if (saved && saved.startsWith('sk-')) {
    DEEPSEEK_API_KEY = saved;
    return true;
  }
  if (saved) localStorage.removeItem('deepseek_api_key');
  const key = prompt('📖 请输入你的 DeepSeek API Key（以 sk- 开头）：');
  if (key && key.trim().startsWith('sk-')) {
    DEEPSEEK_API_KEY = key.trim();
    localStorage.setItem('deepseek_api_key', DEEPSEEK_API_KEY);
    return true;
  } else {
    alert('❌ 无效的 API Key，请刷新页面重新输入。');
    return false;
  }
}

function resetApiKey() {
  if (confirm('确定要清除保存的 API Key 吗？')) {
    localStorage.removeItem('deepseek_api_key');
    DEEPSEEK_API_KEY = '';
    if (getApiKey()) {
      alert('✅ 新的 API Key 已保存，游戏将重新加载。');
      location.reload();
    } else {
      alert('❌ 未输入有效 Key，请刷新页面重试。');
    }
  }
}
window.resetApiKey = resetApiKey;

// ============================================================
//  游戏核心变量
// ============================================================
const messagesDiv = document.getElementById('messages');
const userInput = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const memoryPanel = document.getElementById('memoryPanel');
const shortMemoryDiv = document.getElementById('shortMemory');
const longMemoryDiv = document.getElementById('longMemory');
const shortCounter = document.getElementById('shortCounter');
const longCounter = document.getElementById('longCounter');
const locDisplay = document.getElementById('locDisplay');
const stateDisplay = document.getElementById('stateDisplay');
const locTag = document.getElementById('locTag');
const modeTag = document.getElementById('modeTag');
const sensBar = document.getElementById('sensBar');
const fullBar = document.getElementById('fullBar');
const fluidBar = document.getElementById('fluidBar');
const fatigueBar = document.getElementById('fatigueBar');
const sensVal = document.getElementById('sensVal');
const fullVal = document.getElementById('fullVal');
const fluidVal = document.getElementById('fluidVal');
const fatigueVal = document.getElementById('fatigueVal');
const modeSelect = document.getElementById('modeSelect');

let gameState = {
  location: '初始之地',
  state: '觉醒',
  sensitivity: 80,
  fullness: 70,
  fluid: 60,
  fatigue: 10,
  eggs: { count: 0, progress: 0 },
  motherTentacle: '无',
  mode: '探索模式',
  npcFrequency: '正常',
  // 自定义扩展
  customStatus: {}
};

let memorySystem = {
  shortMemory: '',
  longMemory: '',
  shortRoundCount: 0,
  longRoundCount: 0,
  totalRounds: 0,
  shortThreshold: 10,
  longThreshold: 50,
  shortBuffer: [],
  longBuffer: []
};

let conversationHistory = [];

// ============================================================
//  世界观与NPC存储
// ============================================================
function getWorldSetting() {
  return localStorage.getItem('world_setting') || '';
}

function setWorldSetting(text) {
  localStorage.setItem('world_setting', text);
}

function getNpcList() {
  try {
    return JSON.parse(localStorage.getItem('npc_list') || '[]');
  } catch(e) { return []; }
}

function setNpcList(list) {
  localStorage.setItem('npc_list', JSON.stringify(list));
}

// ============================================================
//  世界观模态框
// ============================================================
function openWorldModal() {
  document.getElementById('worldModal').classList.add('active');
  const text = getWorldSetting();
  document.getElementById('worldInput').value = text;
  document.getElementById('worldCharCount').textContent = text.length + ' 字';
}
window.openWorldModal = openWorldModal;

function closeWorldModal() {
  document.getElementById('worldModal').classList.remove('active');
}
window.closeWorldModal = closeWorldModal;

function saveWorldSetting() {
  const text = document.getElementById('worldInput').value;
  setWorldSetting(text);
  document.getElementById('worldCharCount').textContent = text.length + ' 字';
  alert('✅ 世界观已保存！');
}
window.saveWorldSetting = saveWorldSetting;

function loadWorldSetting() {
  const text = getWorldSetting();
  document.getElementById('worldInput').value = text;
  document.getElementById('worldCharCount').textContent = text.length + ' 字';
}
window.loadWorldSetting = loadWorldSetting;

function clearWorldSetting() {
  if (confirm('确定要清空世界观设定吗？')) {
    document.getElementById('worldInput').value = '';
    setWorldSetting('');
    document.getElementById('worldCharCount').textContent = '0 字';
    alert('🗑️ 已清空');
  }
}
window.clearWorldSetting = clearWorldSetting;

// 字数统计
document.addEventListener('DOMContentLoaded', function() {
  const input = document.getElementById('worldInput');
  if (input) {
    input.addEventListener('input', function() {
      document.getElementById('worldCharCount').textContent = this.value.length + ' 字';
    });
  }
});

// ============================================================
//  NPC 管理
// ============================================================
function openNpcModal() {
  document.getElementById('npcModal').classList.add('active');
  renderNpcList();
  document.getElementById('npcNameInput').value = '';
  document.getElementById('npcDescInput').value = '';
}
window.openNpcModal = openNpcModal;

function closeNpcModal() {
  document.getElementById('npcModal').classList.remove('active');
}
window.closeNpcModal = closeNpcModal;

function renderNpcList() {
  const list = getNpcList();
  const container = document.getElementById('npcList');
  if (list.length === 0) {
    container.innerHTML = '<div style="opacity:0.5;text-align:center;padding:12px;font-size:13px;">📖 暂无NPC，添加一个吧！</div>';
    return;
  }
  container.innerHTML = list.map((npc, index) => `
    <div class="npc-item">
      <div>
        <span class="npc-name">${npc.name}</span>
        <span class="npc-desc">${npc.desc || ''}</span>
      </div>
      <button class="npc-del" onclick="removeNpc(${index})">✕</button>
    </div>
  `).join('');
}

function addNpc() {
  const name = document.getElementById('npcNameInput').value.trim();
  const desc = document.getElementById('npcDescInput').value.trim();
  if (!name) { alert('请输入NPC名称！'); return; }
  const list = getNpcList();
  list.push({ name, desc });
  setNpcList(list);
  renderNpcList();
  document.getElementById('npcNameInput').value = '';
  document.getElementById('npcDescInput').value = '';
}
window.addNpc = addNpc;

function removeNpc(index) {
  const list = getNpcList();
  list.splice(index, 1);
  setNpcList(list);
  renderNpcList();
}
window.removeNpc = removeNpc;

function saveNpcList() {
  // 已经自动保存了，只是提示
  alert('✅ NPC列表已保存！');
}
window.saveNpcList = saveNpcList;

function loadNpcList() {
  renderNpcList();
  alert('📂 已加载NPC列表');
}
window.loadNpcList = loadNpcList;

function clearNpcList() {
  if (confirm('确定要清空所有NPC吗？')) {
    setNpcList([]);
    renderNpcList();
    alert('🗑️ 已清空');
  }
}
window.clearNpcList = clearNpcList;

// Enter键添加NPC
document.addEventListener('DOMContentLoaded', function() {
  const nameInput = document.getElementById('npcNameInput');
  const descInput = document.getElementById('npcDescInput');
  if (nameInput) {
    nameInput.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') addNpc();
    });
  }
  if (descInput) {
    descInput.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') addNpc();
    });
  }
});

// ============================================================
//  主题切换
// ============================================================
function openThemeModal() {
  document.getElementById('themeModal').classList.add('active');
  // 高亮当前主题
  const current = document.body.className.replace('theme-', '');
  document.querySelectorAll('.theme-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.theme === current);
  });
}
window.openThemeModal = openThemeModal;

function closeThemeModal() {
  document.getElementById('themeModal').classList.remove('active');
}
window.closeThemeModal = closeThemeModal;

function setTheme(theme) {
  // 移除所有主题类
  document.body.className = document.body.className.split(' ').filter(c => !c.startsWith('theme-')).join(' ');
  document.body.classList.add('theme-' + theme);
  // 保存主题偏好
  localStorage.setItem('user_theme', theme);
  // 更新按钮高亮
  document.querySelectorAll('.theme-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.theme === theme);
  });
  closeThemeModal();
}
window.setTheme = setTheme;

// 加载保存的主题
function loadTheme() {
  const saved = localStorage.getItem('user_theme');
  if (saved) {
    document.body.classList.add('theme-' + saved);
  } else {
    document.body.classList.add('theme-shuimo'); // 默认水墨
  }
  }
  // ============================================================
//  存档系统
// ============================================================
function getSaves() {
  return JSON.parse(localStorage.getItem('game_saves') || '{}');
}

function setSaves(saves) {
  localStorage.setItem('game_saves', JSON.stringify(saves));
}

function renderSaveList() {
  const saves = getSaves();
  const list = document.getElementById('saveList');
  const keys = Object.keys(saves);
  if (keys.length === 0) {
    list.innerHTML = '<li style="opacity:0.5;text-align:center;padding:12px;">📖 暂无存档</li>';
    return;
  }
  list.innerHTML = keys.map(name => {
    const data = saves[name];
    const time = data.timestamp ? new Date(data.timestamp).toLocaleString() : '未知';
    return `<li style="display:flex;justify-content:space-between;align-items:center;padding:6px 10px;border-radius:4px;border:1px solid rgba(0,0,0,0.06);margin-bottom:4px;">
      <div><span style="font-weight:600;">${name}</span> <span style="opacity:0.5;font-size:11px;">${time}</span></div>
      <div>
        <button onclick="loadGame('${name}')" style="background:none;border:none;cursor:pointer;font-size:16px;margin-right:4px;">📂</button>
        <button onclick="deleteSave('${name}')" style="background:none;border:none;cursor:pointer;font-size:16px;opacity:0.4;">✕</button>
      </div>
    </li>`;
  }).join('');
}

function openSaveModal() {
  document.getElementById('saveModal').classList.add('active');
  renderSaveList();
  document.getElementById('saveNameInput').value = '';
}
window.openSaveModal = openSaveModal;

function closeSaveModal() {
  document.getElementById('saveModal').classList.remove('active');
}
window.closeSaveModal = closeSaveModal;

document.getElementById('saveModal')?.addEventListener('click', function(e) {
  if (e.target === this) closeSaveModal();
});

function saveGame() {
  const nameInput = document.getElementById('saveNameInput');
  const name = nameInput.value.trim();
  if (!name) { alert('请给存档起个名字吧。'); return; }
  const saves = getSaves();
  if (saves[name] && !confirm(`「${name}」已存在，要覆盖吗？`)) return;
  saves[name] = {
    gameState: JSON.parse(JSON.stringify(gameState)),
    memorySystem: JSON.parse(JSON.stringify(memorySystem)),
    conversationHistory: JSON.parse(JSON.stringify(conversationHistory)),
    mode: gameState.mode,
    timestamp: Date.now()
  };
  setSaves(saves);
  renderSaveList();
  nameInput.value = '';
  alert('✅ 存档「' + name + '」已保存。');
}
window.saveGame = saveGame;

function loadGame(name) {
  if (!confirm(`读取「${name}」将覆盖当前进度，确定吗？`)) return;
  const saves = getSaves();
  const data = saves[name];
  if (!data) { alert('存档不存在。'); return; }
  gameState = data.gameState;
  memorySystem = data.memorySystem;
  conversationHistory = data.conversationHistory || [];
  if (!conversationHistory.length || conversationHistory[0]?.role !== 'system') {
    conversationHistory.unshift({ role: 'system', content: buildSystemPrompt() });
  } else {
    conversationHistory[0].content = buildSystemPrompt();
  }
  modeSelect.value = gameState.mode;
  modeTag.textContent = '🔍 ' + gameState.mode;
  messagesDiv.innerHTML = '';
  for (const msg of conversationHistory) {
    if (msg.role === 'user') appendMessage('user', msg.content);
    else if (msg.role === 'assistant') appendMessage('narrative', msg.content);
  }
  updateStatusDisplay();
  updateMemoryDisplay();
  closeSaveModal();
  alert('✅ 已读取「' + name + '」');
}

async function summarizeMemory(messages, type) {
  const summaryPrompt = type === 'short'
    ? '请用1-3句话总结以下对话中发生的关键事件。只描述事实，不要评价。\n\n对话内容：\n' + messages
    : '请用2-4句话总结以下短期记忆，提取最重要的剧情发展。\n\n短期记忆内容：\n' + messages;
  try {
    const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${DEEPSEEK_API_KEY}` },
      body: JSON.stringify({
        model: 'deepseek-chat',
        messages: [
          { role: 'system', content: '你是一个简洁的总结助手。只输出总结内容，不要加任何前缀或解释。' },
          { role: 'user', content: summaryPrompt }
        ],
        stream: false,
        temperature: 0.5,
        max_tokens: 300
      })
    });
    if (response.ok) {
      const data = await response.json();
      return data.choices?.[0]?.message?.content?.trim() || '';
    }
  } catch(e) {}
  return '';
}

async function checkAndUpdateMemory(userMsg, aiResponse) {
  const shortSummary = '玩家：' + userMsg.slice(0, 80) + ' | 世界：' + aiResponse.slice(0, 120);
  memorySystem.shortBuffer.push(shortSummary);
  memorySystem.shortRoundCount++;
  memorySystem.longRoundCount++;
  memorySystem.totalRounds++;

  if (memorySystem.shortRoundCount >= memorySystem.shortThreshold) {
    appendMessage('memory-notice', '🧠 正在生成短期记忆总结...');
    const bufferText = memorySystem.shortBuffer.join('\n');
    const newShortMemory = await summarizeMemory(bufferText, 'short');
    if (newShortMemory) {
      memorySystem.shortMemory = memorySystem.shortMemory ? memorySystem.shortMemory + '\n' + newShortMemory : newShortMemory;
      memorySystem.shortBuffer = [];
      memorySystem.shortRoundCount = 0;
      updateMemoryDisplay();
      saveMemory();
      appendMessage('memory-notice', '📝 短期记忆已更新（' + memorySystem.totalRounds + '轮）');
    }
  }

  if (memorySystem.longRoundCount >= memorySystem.longThreshold) {
    appendMessage('memory-notice', '📚 正在生成长期记忆总结...');
    const longSummary = await summarizeMemory(memorySystem.shortMemory, 'long');
    if (longSummary) {
      memorySystem.longMemory = memorySystem.longMemory ? memorySystem.longMemory + '\n【第' + memorySystem.totalRounds + '轮】' + longSummary : '【第' + memorySystem.totalRounds + '轮】' + longSummary;
      memorySystem.longRoundCount = 0;
      updateMemoryDisplay();
      saveMemory();
      appendMessage('memory-notice', '📚 长期记忆已更新（' + memorySystem.totalRounds + '轮）');
    }
  }
  saveMemory();
  updateMemoryDisplay();
}

// ============================================================
//  构建系统提示词（动态加载世界观和NPC）

function buildSystemPrompt() {
  let p = '';
  p += '你是一个互动小说世界的叙述者与引导者。你将扮演天地、命运、所有NPC，以及整个世界本身。\n\n';

  // 加载世界观
  const worldSetting = getWorldSetting();
  if (worldSetting) {
    p += '【世界观设定】\n' + worldSetting + '\n\n';
  } else {
    p += '【世界观设定】\n这是一个开放的世界，充满了未知与可能。玩家可以探索、交谈、战斗、修行，一切由你引导。\n\n';
  }

  // 加载NPC
  const npcs = getNpcList();
  if (npcs.length > 0) {
    p += '【NPC列表】\n';
    npcs.forEach(npc => {
      p += '- ' + npc.name + '：' + (npc.desc || '一个神秘的人物') + '\n';
    });
    p += '\n';
  }

  // 模式
  p += '【当前模式】' + gameState.mode + '\n';
  if (gameState.mode === '探索模式') p += '侧重探索与发现，世界中的秘密与奇遇会更多。\n';
  else if (gameState.mode === '叙事模式') p += '侧重故事与人物，剧情推进会更深入。\n';
  else if (gameState.mode === '战斗模式') p += '侧重冲突与挑战，战斗事件会更多。\n';
  else if (gameState.mode === '修行模式') p += '侧重成长与修炼，提升能力的机会更多。\n';
  else if (gameState.mode === '社交模式') p += '侧重交流与关系，NPC互动会更丰富。\n';
  p += '\n';

  // 状态
  p += '【当前状态】\n';
  p += '位置：' + gameState.location + '。状态：' + gameState.state + '。\n';
  p += '体力：' + gameState.sensitivity + '%。精神：' + gameState.fullness + '%。灵力：' + gameState.fluid + '%。伤势：' + gameState.fatigue + '%\n\n';

  // 记忆
  if (memorySystem.longMemory) p += '📚 长期记忆：\n' + memorySystem.longMemory + '\n';
  if (memorySystem.shortMemory) p += '📝 短期记忆：\n' + memorySystem.shortMemory + '\n';

  // 叙事规则
  p += '【叙事规则】\n';
  p += '1. 用第二人称"你"展开叙事，沉浸式体验。\n';
  p += '2. 描写环境要富有画面感，符合当前主题风格。\n';
  p += '3. 对话要符合人物性格。\n';
  p += '4. 根据玩家的行动更新状态。\n';
  p += '5. 保持世界的连贯性与因果感。\n';
  p += '6. 回复开头用【地点】和【状态】标注当前位置与心境。\n\n';
  p += '现在，开始叙事。玩家正在等待你的引导。';

  return p;
}

// ============================================================
//  消息处理
// ============================================================
function appendMessage(type, text) {
  const d = document.createElement('div');
  if (type === 'system') {
    d.classList.add('sys-msg');
  } else if (type === 'memory-notice') {
    d.classList.add('memory-notice');
  } else if (type === 'narrative') {
    d.classList.add('narr-msg');
  } else if (type === 'user') {
    d.classList.add('user-msg');
  } else if (type === 'divider') {
    d.classList.add('divider-line');
    d.textContent = '✦ ✦ ✦';
    messagesDiv.appendChild(d);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
    return d;
  } else if (type === 'thinking') {
    d.classList.add('thinking-msg');
    d.textContent = text;
    messagesDiv.appendChild(d);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
    return d;
  }
  d.textContent = text;
  messagesDiv.appendChild(d);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
  return d;
}

function parseStateFromResponse(text) {
  const lm = text.match(/【地点】[：:]\s*(.+)/);
  const sm = text.match(/【状态】[：:]\s*(.+)/);
  if (lm) { const l = lm[1].trim(); if (l) gameState.location = l; }
  if (sm) gameState.state = sm[1].trim();
  const sensMatch = text.match(/体力\s*(\d+)%/);
  const fullMatch = text.match(/精神\s*(\d+)%/);
  const fluidMatch = text.match(/灵力\s*(\d+)%/);
  const fatigueMatch = text.match(/伤势\s*(\d+)%/);
  if (sensMatch) gameState.sensitivity = Math.max(0, Math.min(100, parseInt(sensMatch[1])));
  if (fullMatch) gameState.fullness = Math.max(0, Math.min(100, parseInt(fullMatch[1])));
  if (fluidMatch) gameState.fluid = Math.max(0, Math.min(100, parseInt(fluidMatch[1])));
  if (fatigueMatch) gameState.fatigue = Math.max(0, Math.min(100, parseInt(fatigueMatch[1])));
  updateStatusDisplay();
}
  // ============================================================
//  发送消息（核心）
// ============================================================
async function sendMessage(userText) {
  if (!userText || !userText.trim()) return;
  const trimmedText = userText.trim();
  appendMessage('user', trimmedText);
  userInput.value = '';
  sendBtn.disabled = true;

  conversationHistory.push({ role: 'user', content: trimmedText });
  if (conversationHistory.length > 31) {
    conversationHistory = [conversationHistory[0], ...conversationHistory.slice(-30)];
  }
  localStorage.setItem('conversation_history', JSON.stringify(conversationHistory));

  appendMessage('divider', '');
  const thinkingDiv = appendMessage('thinking', '……');
  let fullContent = '';

  try {
    const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${DEEPSEEK_API_KEY}`
      },
      body: JSON.stringify({
        model: 'deepseek-chat',
        messages: conversationHistory,
        stream: true,
        temperature: 0.85,
        max_tokens: 2500
      })
    });

    if (!response.ok) {
      const error = await response.json();
      throw new Error(error.error?.message || '请求失败 (' + response.status + ')');
    }

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();
      for (const line of lines) {
        const t = line.trim();
        if (!t || !t.startsWith('data: ')) continue;
        const ds = t.slice(6);
        if (ds === '[DONE]') continue;
        try {
          const json = JSON.parse(ds);
          const delta = json.choices?.[0]?.delta?.content;
          if (delta) {
            fullContent += delta;
            thinkingDiv.textContent = fullContent;
            thinkingDiv.className = 'narr-msg';
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
          }
        } catch(e) {}
      }
    }

    parseStateFromResponse(fullContent);
    conversationHistory.push({ role: 'assistant', content: fullContent });
    localStorage.setItem('conversation_history', JSON.stringify(conversationHistory));
    conversationHistory[0] = { role: 'system', content: buildSystemPrompt() };
    await checkAndUpdateMemory(trimmedText, fullContent.slice(0, 300));

  } catch(error) {
    thinkingDiv.textContent = '📖 世界暂时没有回应...（错误：' + error.message + '）';
    thinkingDiv.style.opacity = '0.6';
  } finally {
    sendBtn.disabled = false;
    userInput.focus();
  }
}

function quickAction(action) {

// ============================================================
//  撤回功能
// ============================================================
function undoLastMessage() {
  const userIndices = [], aiIndices = [];
  for (let i = 0; i < conversationHistory.length; i++) {
    if (conversationHistory[i].role === 'user') userIndices.push(i);
    if (conversationHistory[i].role === 'assistant') aiIndices.push(i);
  }
  if (userIndices.length === 0 || aiIndices.length === 0) {
    alert('📖 没有可以撤回的消息。');
    return;
  }
  const lastUserIdx = userIndices[userIndices.length - 1];
  const lastAiIdx = aiIndices[aiIndices.length - 1];
  const startIdx = Math.min(lastUserIdx, lastAiIdx);
  const endIdx = Math.max(lastUserIdx, lastAiIdx);
  const toRemove = [];
  for (let i = startIdx; i <= endIdx; i++) toRemove.push(i);
  toRemove.sort((a, b) => b - a);
  for (const idx of toRemove) conversationHistory.splice(idx, 1);
  localStorage.setItem('conversation_history', JSON.stringify(conversationHistory));
  messagesDiv.innerHTML = '';
  for (const msg of conversationHistory) {
    if (msg.role === 'user') appendMessage('user', msg.content);
    else if (msg.role === 'assistant') appendMessage('narrative', msg.content);
  }
  if (conversationHistory.length > 1) appendMessage('system', '↩ 已撤回上一条消息');
  else appendMessage('system', '↩ 已撤回所有消息，游戏重新开始');
  updateStatusDisplay();
  updateMemoryDisplay();
}
window.undoLastMessage = undoLastMessage;

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.gameState || !data.memorySystem || !data.conversationHistory) {
        alert('❌ 无效的存档文件。');
        return;
      }
      if (!confirm('导入将覆盖当前所有进度，确定继续吗？')) return;
      gameState = data.gameState;
      memorySystem = data.memorySystem;
      conversationHistory = data.conversationHistory || [];
      if (data.mode) {
        gameState.mode = data.mode;
        modeSelect.value = data.mode;
        modeTag.textContent = '🔍 ' + data.mode;
      }
      if (data.apiKey && data.apiKey.startsWith('sk-')) {
        localStorage.setItem('deepseek_api_key', data.apiKey);
        DEEPSEEK_API_KEY = data.apiKey;
      }
      if (data.saves) setSaves(data.saves);
      if (data.worldSetting) setWorldSetting(data.worldSetting);
      if (data.npcList) setNpcList(data.npcList);
      messagesDiv.innerHTML = '';
      if (!conversationHistory.length || conversationHistory[0]?.role !== 'system') {
        conversationHistory.unshift({ role: 'system', content: buildSystemPrompt() });
      } else {
        conversationHistory[0].content = buildSystemPrompt();
      }
      for (const msg of conversationHistory) {
        if (msg.role === 'user') appendMessage('user', msg.content);
        else if (msg.role === 'assistant') appendMessage('narrative', msg.content);
      }
      updateStatusDisplay();
      updateMemoryDisplay();
      localStorage.setItem('game_mode', gameState.mode);
      localStorage.setItem('conversation_history', JSON.stringify(conversationHistory));
      saveMemory();
      alert('✅ 数据导入成功！');
    } catch(err) {
      alert('❌ 导入失败：文件格式错误。');
      console.error(err);
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}
window.importData = importData;

  if (savedHistory) {
    try {
      conversationHistory = JSON.parse(savedHistory);
      if (conversationHistory[0]?.role === 'system') {
        conversationHistory[0].content = buildSystemPrompt();
      } else {
        conversationHistory.unshift({ role: 'system', content: buildSystemPrompt() });
      }
      for (const msg of conversationHistory) {
        if (msg.role === 'user') appendMessage('user', msg.content);
        else if (msg.role === 'assistant') appendMessage('narrative', msg.content);
      }
    } catch(e) {
      conversationHistory = [{ role: 'system', content: buildSystemPrompt() }];
    }
  } else {
    conversationHistory = [{ role: 'system', content: buildSystemPrompt() }];
  }

  loadMemory();
  updateStatusDisplay();
  updateMemoryDisplay();

  if (messagesDiv.children.length === 0) {
    appendMessage('system', '📖 世界引擎已启动');
    appendMessage('system', '🌍 你可以自由探索、创造、书写属于你的故事。');
    appendMessage('narrative',
      '你站在一片未知的土地上。\n\n' +
      '风从远方吹来，带着草木与泥土的气息。天边有云层缓缓移动，阳光穿过缝隙洒落，在地面上投下斑驳的光影。\n\n' +
      '这是一个充满可能的世界。\n' +
      '你可以去任何地方，见任何人，做任何事。\n\n' +
      '【你可以：探索周围 / 观察环境 / 与NPC交谈 / 休息恢复 / 查看状态】'
    );
  }

  userInput.focus();
});
</script>
