<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🌸 共生之家 · 粉嫩版</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
      background: #fce4ec;
      background-image: radial-gradient(circle at 20% 30%, #ffd9e6 0%, #f8bbd0 100%);
      background-attachment: fixed;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 10px;
    }

    .game-container {
      width: 100%;
      max-width: 500px;
      height: 96vh;
      max-height: 860px;
      display: flex;
      flex-direction: column;
      background: #fff5f7;
      border-radius: 32px;
      box-shadow: 0 12px 40px rgba(255, 105, 135, 0.25);
      overflow: hidden;
      border: 2px solid #ffb6c9;
      position: relative;
    }

    .game-container::before {
      content: '🌸';
      position: absolute;
      top: -8px;
      right: 20px;
      font-size: 28px;
      opacity: 0.4;
      transform: rotate(15deg);
      pointer-events: none;
    }
    .game-container::after {
      content: '🩷';
      position: absolute;
      bottom: 60px;
      left: 10px;
      font-size: 24px;
      opacity: 0.2;
      transform: rotate(-10deg);
      pointer-events: none;
    }

    .header {
      background: linear-gradient(135deg, #ffb6c9, #ff8aab);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 2px solid #ff9eb5;
      border-radius: 32px 32px 0 0;
      flex-wrap: wrap;
      position: relative;
      z-index: 2;
    }
    .header-title {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 2px 4px rgba(200, 60, 100, 0.3);
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .header-btns {
      margin-left: auto;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
    }
    .header-btn {
      font-size: 11px;
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid #ffd9e6;
      background: rgba(255, 255, 255, 0.5);
      color: #a04a5a;
      cursor: pointer;
      white-space: nowrap;
      backdrop-filter: blur(4px);
      transition: all 0.2s;
      font-weight: 500;
    }
    .header-btn:active {
      background: #ffb6c9;
      color: #fff;
      transform: scale(0.95);
    }
    .header-btn:hover {
      background: rgba(255, 255, 255, 0.8);
    }

    .mode-select {
      padding: 4px 8px;
      border-radius: 20px;
      border: 1px solid #ffb6c9;
      background: rgba(255, 255, 255, 0.7);
      font-size: 11px;
      color: #7a3a4a;
      font-weight: 500;
      outline: none;
      cursor: pointer;
      backdrop-filter: blur(4px);
      max-width: 130px;
    }
    .mode-select:focus {
      border-color: #ff6b8a;
      box-shadow: 0 0 0 2px rgba(255, 107, 138, 0.2);
    }

    .status-panel {
      background: #fff0f3;
      padding: 10px 14px;
      border-bottom: 1px solid #ffd9e6;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px 10px;
    }
    .status-item {
      font-size: 12px;
      color: #7a4a5a;
      font-weight: 500;
    }
    .status-item span {
      color: #d44a6a;
      font-weight: 700;
    }
    .status-bar {
      grid-column: 1 / -1;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 2px;
    }
    .bar-mini {
      flex: 1;
      min-width: 50px;
      font-size: 10px;
      color: #a05a6a;
      font-weight: 500;
    }
    .bar-track {
      height: 6px;
      background: #ffd9e6;
      border-radius: 10px;
      margin-top: 2px;
      overflow: hidden;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.05);
    }
    .bar-fill {
      height: 100%;
      border-radius: 10px;
      transition: width 0.6s ease;
    }
    .bar-fill.sens { background: linear-gradient(90deg, #ff8aab, #ff6b8a); }
    .bar-fill.full { background: linear-gradient(90deg, #ffb07a, #ff8a5a); }
    .bar-fill.fluid { background: linear-gradient(90deg, #8ac4ff, #5aa9ff); }
    .bar-fill.fatigue { background: linear-gradient(90deg, #b08ad4, #8a5ac4); }

    .location-tag {
      padding: 6px 14px;
      background: #ffecf0;
      display: flex;
      gap: 12px;
      font-size: 12px;
      color: #8a5a6a;
      border-bottom: 1px solid #ffd9e6;
      font-weight: 500;
    }
    .location-tag .loc { color: #d44a6a; font-weight: 700; }
    .location-tag .mode { color: #b06a7a; font-style: italic; }

    .memory-panel {
      display: none;
      background: #fff5f7;
      padding: 10px 14px;
      border-bottom: 1px solid #ffd9e6;
      max-height: 200px;
      overflow-y: auto;
    }
    .memory-panel.show { display: block; }
    .memory-section { margin-bottom: 8px; }
    .memory-label {
      font-size: 10px;
      color: #a05a6a;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 600;
    }
    .memory-edit {
      font-size: 10px;
      color: #d44a6a;
      cursor: pointer;
      border: none;
      background: none;
      font-weight: 600;
    }
    .memory-text {
      font-size: 12px;
      color: #7a4a5a;
      line-height: 1.6;
      background: #fff5f7;
      padding: 8px 12px;
      border-radius: 16px;
      border: 1px solid #ffd9e6;
      min-height: 20px;
    }
    .memory-text:empty::before { content: '💭 暂无记忆...'; color: #d4a0b0; }
    .memory-counter { font-size: 9px; color: #b07a8a; }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: #fefafb;
      scroll-behavior: smooth;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: #ffb6c9; border-radius: 10px; }

    .sys-msg {
      align-self: center;
      font-size: 11px;
      color: #a06a7a;
      padding: 6px 16px;
      background: #ffecf0;
      border-radius: 20px;
      max-width: 90%;
      text-align: center;
      border: 1px solid #ffd9e6;
      font-weight: 500;
    }
    .memory-notice {
      align-self: center;
      font-size: 10px;
      color: #b07a6a;
      padding: 4px 14px;
      background: #fff0e8;
      border-radius: 16px;
      border: 1px solid #ffd0b0;
      text-align: center;
    }
    .narr-msg {
      align-self: flex-start;
      max-width: 88%;
      padding: 12px 18px;
      border-radius: 8px 20px 20px 20px;
      font-size: 14px;
      line-height: 1.7;
      color: #4a2a32;
      background: #fff0f3;
      border-left: 4px solid #ff8aab;
      white-space: pre-wrap;
      word-wrap: break-word;
      box-shadow: 0 2px 6px rgba(255, 105, 135, 0.08);
    }
    .user-msg {
      align-self: flex-end;
      max-width: 82%;
      padding: 10px 18px;
      border-radius: 20px 8px 20px 20px;
      font-size: 14px;
      line-height: 1.5;
      color: #fff;
      background: linear-gradient(135deg, #ff8aab, #ff6b8a);
      border: none;
      white-space: pre-wrap;
      word-wrap: break-word;
      box-shadow: 0 2px 8px rgba(255, 105, 135, 0.2);
    }

    .input-area {
      display: flex;
      padding: 10px 14px;
      gap: 8px;
      background: #fff5f7;
      border-top: 1px solid #ffd9e6;
      border-radius: 0 0 32px 32px;
    }
    .input-area input {
      flex: 1;
      padding: 12px 18px;
      border: 2px solid #ffd9e6;
      border-radius: 30px;
      font-size: 15px;
      background: #fff;
      color: #3a2a2e;
      outline: none;
      transition: border 0.2s;
    }
    .input-area input::placeholder { color: #d4a0b0; font-weight: 400; }
    .input-area input:focus {
      border-color: #ff8aab;
      box-shadow: 0 0 0 3px rgba(255, 138, 171, 0.15);
    }
    .send-btn {
      background: linear-gradient(135deg, #ff8aab, #ff6b8a);
      border: none;
      color: #fff;
      font-size: 20px;
      width: 46px;
      height: 46px;
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 2px 8px rgba(255, 105, 135, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .send-btn:active {
      transform: scale(0.92);
      box-shadow: 0 1px 4px rgba(255, 105, 135, 0.2);
    }
    .send-btn:disabled {
      background: #ffd9e6;
      color: #d4a0b0;
      box-shadow: none;
      cursor: not-allowed;
    }

    .quick-actions {
      display: flex;
      gap: 6px;
      padding: 6px 14px 8px;
      flex-wrap: wrap;
      background: #fff5f7;
      border-top: 1px solid #ffecf0;
    }
    .quick-btn {
      font-size: 11px;
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid #ffd9e6;
      background: #fff;
      color: #a05a6a;
      cursor: pointer;
      white-space: nowrap;
      font-weight: 500;
      transition: all 0.15s;
    }
    .quick-btn:active {
      background: #ffb6c9;
      color: #fff;
      border-color: #ff8aab;
      transform: scale(0.95);
    }

    @media (max-width: 500px) {
      .game-container { border-radius: 24px; height: 98vh; max-height: none; }
      .header { border-radius: 24px 24px 0 0; padding: 10px 12px; }
      .header-title { font-size: 17px; }
      .mode-select { max-width: 100px; font-size: 10px; }
    }
  </style>
</head>
<body>
<div class="game-container">
  <div class="header">
    <span class="header-title">🌸 共生之家</span>
    <div class="header-btns">
      <select id="modeSelect" class="mode-select" onchange="switchMode(this.value)">
        <option value="温柔之家">💗 温柔之家</option>
        <option value="无尽热望">🔥 无尽热望</option>
        <option value="嫉妒之火">💔 嫉妒之火</option>
        <option value="深渊邀请">🌊 深渊邀请</option>
        <option value="欲望苗床">🌱 欲望苗床</option>
      </select>
      <button class="header-btn" onclick="toggleMemoryPanel()">🧠 记忆</button>
      <button class="header-btn" onclick="resetGame()">🔄 重置</button>
      <button class="header-btn" onclick="resetApiKey()">🔑 换Key</button>
    </div>
  </div>

  <div class="status-panel" id="statusPanel">
    <div class="status-item">📍 <span id="locDisplay">客厅</span></div>
    <div class="status-item">🌡️ <span id="stateDisplay">清醒</span></div>
    <div class="status-bar">
      <div class="bar-mini">💕 敏感<span id="sensVal">30%</span>
        <div class="bar-track"><div class="bar-fill sens" id="sensBar" style="width:30%"></div></div>
      </div>
      <div class="bar-mini">🍰 饱腹<span id="fullVal">75%</span>
        <div class="bar-track"><div class="bar-fill full" id="fullBar" style="width:75%"></div></div>
      </div>
      <div class="bar-mini">💧 体液<span id="fluidVal">40%</span>
        <div class="bar-track"><div class="bar-fill fluid" id="fluidBar" style="width:40%"></div></div>
      </div>
      <div class="bar-mini">😴 疲劳<span id="fatigueVal">15%</span>
        <div class="bar-track"><div class="bar-fill fatigue" id="fatigueBar" style="width:15%"></div></div>
      </div>
    </div>
  </div>

  <div class="memory-panel" id="memoryPanel">
    <div class="memory-section">
      <div class="memory-label">
        📝 短期记忆 <span class="memory-counter" id="shortCounter">(0/10轮)</span>
        <button class="memory-edit" onclick="editMemory('short')">✏️</button>
      </div>
      <div class="memory-text" id="shortMemory" contenteditable="false"></div>
    </div>
    <div class="memory-section">
      <div class="memory-label">
        📚 长期记忆 <span class="memory-counter" id="longCounter">(0/50轮)</span>
        <button class="memory-edit" onclick="editMemory('long')">✏️</button>
      </div>
      <div class="memory-text" id="longMemory" contenteditable="false"></div>
    </div>
  </div>

  <div class="location-tag">
    <span class="loc" id="locTag">📍 客厅</span>
    <span class="mode" id="modeTag">🌸 温柔之家</span>
  </div>

  <div class="messages" id="messages"></div>

  <div class="quick-actions" id="quickActions">
    <button class="quick-btn" onclick="quickAction('探索房间')">🔍 探索</button>
    <button class="quick-btn" onclick="quickAction('去厨房吃东西')">🍽️ 进食</button>
    <button class="quick-btn" onclick="quickAction('去浴室洗澡')">🚿 洗澡</button>
    <button class="quick-btn" onclick="quickAction('去卧室休息')">🛏️ 休息</button>
    <button class="quick-btn" onclick="quickAction('检查身体状态')">💓 状态</button>
  </div>

  <div class="input-area">
    <input type="text" id="userInput" placeholder="描述你的行动..." autocomplete="off" enterkeyhint="send" />
    <button class="send-btn" id="sendBtn">✨</button>
  </div>
</div>

<script>
  // ============================================================
//  🔑 API Key 管理：首次使用时输入，保存到 localStorage
// ============================================================
let DEEPSEEK_API_KEY = '';

function getApiKey() {
  const saved = localStorage.getItem('deepseek_api_key');
  if (saved && saved.startsWith('sk-')) {
    DEEPSEEK_API_KEY = saved;
    return true;
  }
  const key = prompt('🌸 请输入你的 DeepSeek API Key（以 sk- 开头）：');
  if (key && key.trim().startsWith('sk-')) {
    DEEPSEEK_API_KEY = key.trim();
    localStorage.setItem('deepseek_api_key', DEEPSEEK_API_KEY);
    return true;
  } else {
    alert('❌ 无效的 API Key，请刷新页面重新输入。');
    return false;
  }
}

function resetApiKey() {
  if (confirm('确定要清除保存的 API Key 吗？')) {
    localStorage.removeItem('deepseek_api_key');
    DEEPSEEK_API_KEY = '';
    alert('✅ 已清除，刷新页面后重新输入。');
  }
}
window.resetApiKey = resetApiKey;

// ============================================================
//  游戏核心逻辑
// ============================================================
const messagesDiv = document.getElementById('messages');
const userInput = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const memoryPanel = document.getElementById('memoryPanel');
const shortMemoryDiv = document.getElementById('shortMemory');
const longMemoryDiv = document.getElementById('longMemory');
const shortCounter = document.getElementById('shortCounter');
const longCounter = document.getElementById('longCounter');
const locDisplay = document.getElementById('locDisplay');
const stateDisplay = document.getElementById('stateDisplay');
const locTag = document.getElementById('locTag');
const modeTag = document.getElementById('modeTag');
const sensBar = document.getElementById('sensBar');
const fullBar = document.getElementById('fullBar');
const fluidBar = document.getElementById('fluidBar');
const fatigueBar = document.getElementById('fatigueBar');
const sensVal = document.getElementById('sensVal');
const fullVal = document.getElementById('fullVal');
const fluidVal = document.getElementById('fluidVal');
const fatigueVal = document.getElementById('fatigueVal');
const modeSelect = document.getElementById('modeSelect');

let gameState = {
  location: '客厅',
  state: '清醒',
  sensitivity: 30,
  fullness: 75,
  fluid: 40,
  fatigue: 15,
  eggs: { count: 0, progress: 0 },
  motherTentacle: '无',
  mode: '温柔之家',
  npcFrequency: '正常'
};

let memorySystem = {
  shortMemory: '',
  longMemory: '',
  shortRoundCount: 0,
  longRoundCount: 0,
  totalRounds: 0,
  shortThreshold: 10,
  longThreshold: 50,
  shortBuffer: [],
  longBuffer: []
};

let conversationHistory = [];

// ============================================================
//  模式切换
// ============================================================
function switchMode(newMode) {
  if (newMode === gameState.mode) return;
  if (!confirm(`切换到「${newMode}」模式？游戏将重新开始。`)) {
    modeSelect.value = gameState.mode;
    return;
  }
  gameState.mode = newMode;
  localStorage.setItem('game_mode', newMode);
  resetGameSilent();
  initGame();
  updateStatusDisplay();
  modeTag.textContent = '🌸 ' + newMode;
  modeSelect.value = newMode;
  appendMessage('system', '🌸 已切换到「' + newMode + '」模式');
}
window.switchMode = switchMode;

function resetGameSilent() {
  localStorage.removeItem('symbiosis_memory');
  localStorage.removeItem('conversation_history');
  memorySystem = {
    shortMemory: '', longMemory: '',
    shortRoundCount: 0, longRoundCount: 0, totalRounds: 0,
    shortThreshold: 10, longThreshold: 50,
    shortBuffer: [], longBuffer: []
  };
  gameState = {
    location: '客厅', state: '清醒',
    sensitivity: 30, fullness: 75, fluid: 40, fatigue: 15,
    eggs: { count: 0, progress: 0 },
    motherTentacle: '无',
    mode: gameState.mode,
    npcFrequency: '正常'
  };
  messagesDiv.innerHTML = '';
  conversationHistory = [];
  updateMemoryDisplay();
  updateStatusDisplay();
}

// ============================================================
//  记忆系统
// ============================================================
function loadMemory() {
  try {
    const saved = localStorage.getItem('symbiosis_memory');
    if (saved) {
      const data = JSON.parse(saved);
      memorySystem.shortMemory = data.shortMemory || '';
      memorySystem.longMemory = data.longMemory || '';
      memorySystem.shortRoundCount = data.shortRoundCount || 0;
      memorySystem.longRoundCount = data.longRoundCount || 0;
      memorySystem.totalRounds = data.totalRounds || 0;
      memorySystem.shortBuffer = data.shortBuffer || [];
      memorySystem.longBuffer = data.longBuffer || [];
    }
  } catch(e) {}
  updateMemoryDisplay();
}

function saveMemory() {
  try {
    localStorage.setItem('symbiosis_memory', JSON.stringify({
      shortMemory: memorySystem.shortMemory,
      longMemory: memorySystem.longMemory,
      shortRoundCount: memorySystem.shortRoundCount,
      longRoundCount: memorySystem.longRoundCount,
      totalRounds: memorySystem.totalRounds,
      shortBuffer: memorySystem.shortBuffer,
      longBuffer: memorySystem.longBuffer
    }));
  } catch(e) {}
}

function updateMemoryDisplay() {
  shortMemoryDiv.textContent = memorySystem.shortMemory || '';
  longMemoryDiv.textContent = memorySystem.longMemory || '';
  shortCounter.textContent = '(' + memorySystem.shortRoundCount + '/' + memorySystem.shortThreshold + '轮)';
  longCounter.textContent = '(' + memorySystem.longRoundCount + '/' + memorySystem.longThreshold + '轮)';
}

function toggleMemoryPanel() {
  memoryPanel.classList.toggle('show');
}
window.toggleMemoryPanel = toggleMemoryPanel;

function editMemory(type) {
  const div = type === 'short' ? shortMemoryDiv : longMemoryDiv;
  const isEditing = div.contentEditable === 'true';
  if (isEditing) {
    div.contentEditable = 'false';
    div.style.border = '1px solid #ffd9e6';
    div.style.background = '#fff5f7';
    if (type === 'short') memorySystem.shortMemory = div.textContent.trim();
    else memorySystem.longMemory = div.textContent.trim();
    saveMemory();
    appendMessage('system', type === 'short' ? '📝 短期记忆已更新' : '📚 长期记忆已更新');
  } else {
    div.contentEditable = 'true';
    div.style.border = '2px solid #ff8aab';
    div.style.background = '#fff0f3';
    div.focus();
  }
}
window.editMemory = editMemory;

// ============================================================
//  总结和记忆更新
// ============================================================
async function summarizeMemory(messages, type) {
  const summaryPrompt = type === 'short'
    ? '请用1-3句话总结以下对话中发生的关键事件。只描述事实，不要评价。聚焦于：地点变化、身体状态变化、重要互动、NPC出现。\n\n对话内容：\n' + messages
    : '请用2-4句话总结以下短期记忆，提取最重要的剧情发展和身体变化。\n\n短期记忆内容：\n' + messages;
  try {
    const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${DEEPSEEK_API_KEY}`
      },
      body: JSON.stringify({
        model: 'deepseek-chat',
        messages: [
          { role: 'system', content: '你是一个简洁的总结助手。只输出总结内容，不要加任何前缀或解释。' },
          { role: 'user', content: summaryPrompt }
        ],
        stream: false,
        temperature: 0.5,
        max_tokens: 300
      })
    });
    if (response.ok) {
      const data = await response.json();
      return data.choices?.[0]?.message?.content?.trim() || '';
    }
  } catch(e) {}
  return '';
}

async function checkAndUpdateMemory(userMsg, aiResponse) {
  const shortSummary = '用户：' + userMsg.slice(0, 100) + ' | 房子：' + aiResponse.slice(0, 150);
  memorySystem.shortBuffer.push(shortSummary);
  memorySystem.shortRoundCount++;
  memorySystem.longRoundCount++;
  memorySystem.totalRounds++;

  if (memorySystem.shortRoundCount >= memorySystem.shortThreshold) {
    appendMessage('memory-notice', '🧠 正在生成短期记忆总结...');
    const bufferText = memorySystem.shortBuffer.join('\n');
    const newShortMemory = await summarizeMemory(bufferText, 'short');
    if (newShortMemory) {
      memorySystem.shortMemory = memorySystem.shortMemory
        ? memorySystem.shortMemory + '\n' + newShortMemory
        : newShortMemory;
      memorySystem.shortBuffer = [];
      memorySystem.shortRoundCount = 0;
      updateMemoryDisplay();
      saveMemory();
      appendMessage('memory-notice', '📝 短期记忆已更新（' + memorySystem.totalRounds + '轮）');
    }
  }

  if (memorySystem.longRoundCount >= memorySystem.longThreshold) {
    appendMessage('memory-notice', '📚 正在生成长期记忆总结...');
    const longSummary = await summarizeMemory(memorySystem.shortMemory, 'long');
    if (longSummary) {
      memorySystem.longMemory = memorySystem.longMemory
        ? memorySystem.longMemory + '\n【第' + memorySystem.totalRounds + '轮】' + longSummary
        : '【第' + memorySystem.totalRounds + '轮】' + longSummary;
      memorySystem.longRoundCount = 0;
      updateMemoryDisplay();
      saveMemory();
      appendMessage('memory-notice', '📚 长期记忆已更新（' + memorySystem.totalRounds + '轮）');
    }
  }
  saveMemory();
  updateMemoryDisplay();
}

function updateStatusDisplay() {

function getBodyStatus() {
  let status = '';
  if (gameState.eggs.count > 0) {
    status += gameState.eggs.count + '颗卵';
    if (gameState.eggs.progress > 0) status += '，孵化进度 ' + gameState.eggs.progress + '%';
  } else { status += '空载'; }
  if (gameState.motherTentacle !== '无') status += ' / ' + gameState.motherTentacle;
  return status;
}

// ============================================================
//  消息处理
// ============================================================
function appendMessage(type, text) {
  const d = document.createElement('div');
  if (type === 'system') d.classList.add('sys-msg');
  else if (type === 'memory-notice') d.classList.add('memory-notice');
  else if (type === 'narrative') d.classList.add('narr-msg');
  else if (type === 'user') d.classList.add('user-msg');
  d.textContent = text;
  messagesDiv.appendChild(d);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
  return d;
}

function parseStateFromResponse(text) {
  const lm = text.match(/【当前位置】：(.+)/);
  const sm = text.match(/【当前状态】：(.+)/);
  const bm = text.match(/【身体状态】：敏感度\s*(\d+)%\s*\/\s*饱腹感\s*(\d+)%\s*\/\s*体液积蓄\s*(\d+)%\s*\/\s*疲劳度\s*(\d+)%/);
  const em = text.match(/【体内情况】：(.+)/);
  if (lm) { const l = lm[1].replace('家中-', '').trim(); if (l) gameState.location = l; }
  if (sm) gameState.state = sm[1].trim();
  if (bm) {
    gameState.sensitivity = Math.max(0, Math.min(100, parseInt(bm[1])));
    gameState.fullness = Math.max(0, Math.min(100, parseInt(bm[2])));
    gameState.fluid = Math.max(0, Math.min(100, parseInt(bm[3])));
    gameState.fatigue = Math.max(0, Math.min(100, parseInt(bm[4])));
  }
  if (em) {
    const es = em[1].trim();
    if (es.includes('空载')) { gameState.eggs = { count: 0, progress: 0 }; }
    else {
      const cm = es.match(/(\d+)颗卵/);
      const pm = es.match(/孵化进度\s*(\d+)%/);
      if (cm) gameState.eggs.count = parseInt(cm[1]);
      if (pm) gameState.eggs.progress = parseInt(pm[1]);
    }
    if (es.includes('母触手')) {
      gameState.motherTentacle = es.includes('休眠') ? '母触手休眠中' : '母触手活跃中';
    }
  }
  updateStatusDisplay();
}

// ============================================================
//  发送消息（核心）
// ============================================================
async function sendMessage(userText) {
  if (!userText || !userText.trim()) return;
  const trimmedText = userText.trim();
  appendMessage('user', trimmedText);
  userInput.value = '';
  sendBtn.disabled = true;

  conversationHistory.push({ role: 'user', content: trimmedText });
  if (conversationHistory.length > 31) {
    conversationHistory = [conversationHistory[0], ...conversationHistory.slice(-30)];
  }
  localStorage.setItem('conversation_history', JSON.stringify(conversationHistory));

  const narrDiv = appendMessage('narrative', '...');
  let fullContent = '';

  try {
    const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${DEEPSEEK_API_KEY}`
      },
      body: JSON.stringify({
        model: 'deepseek-chat',
        messages: conversationHistory,
        stream: true,
        temperature: 0.9,
        max_tokens: 2000
      })
    });

    if (!response.ok) {
      const error = await response.json();
      throw new Error(error.error?.message || '请求失败 (' + response.status + ')');
    }

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();
      for (const line of lines) {
        const t = line.trim();
        if (!t || !t.startsWith('data: ')) continue;
        const ds = t.slice(6);
        if (ds === '[DONE]') continue;
        try {
          const json = JSON.parse(ds);
          const delta = json.choices?.[0]?.delta?.content;
          if (delta) {
            fullContent += delta;
            narrDiv.textContent = fullContent;
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
          }
        } catch(e) {}
      }
    }

    parseStateFromResponse(fullContent);
    conversationHistory.push({ role: 'assistant', content: fullContent });
    localStorage.setItem('conversation_history', JSON.stringify(conversationHistory));
    conversationHistory[0] = { role: 'system', content: buildSystemPrompt() };
    await checkAndUpdateMemory(trimmedText, fullContent.slice(0, 300));

  } catch(error) {
    narrDiv.textContent = '⚠️ 房子暂时没有回应...（错误：' + error.message + '）';
  } finally {
    sendBtn.disabled = false;
    userInput.focus();
  }
}

function quickAction(action) {
  userInput.value = action;
  sendMessage(action);
}
window.quickAction = quickAction;
  // ============================================================
//  初始化游戏
// ============================================================
function initGame() {
  const systemPrompt = buildSystemPrompt();
  if (conversationHistory.length === 0 || conversationHistory[0]?.role !== 'system') {
    conversationHistory = [{ role: 'system', content: systemPrompt }];
    localStorage.setItem('conversation_history', JSON.stringify(conversationHistory));
  } else {
    conversationHistory[0].content = systemPrompt;
    localStorage.setItem('conversation_history', JSON.stringify(conversationHistory));
  }

  updateStatusDisplay();
  updateMemoryDisplay();
  if (messagesDiv.children.length === 0) {
    appendMessage('system', '🌸 游戏开始 · 模式：' + gameState.mode);
    appendMessage('system', '🧠 记忆系统已激活 · 点击「记忆」查看');
    appendMessage('narrative',
      '你站在客厅中央。\n\n' +
      '这栋房子很安静，安静得不正常。墙壁是温暖的米白色，沙发看起来柔软而诱人，空气中有一股若有若无的甜腥味。\n\n' +
      '你知道这里没有通往外界的门——除非它允许你离开。\n\n' +
      '脚下的地板微微发暖，仿佛在呼吸。远处，厨房的冰箱发出轻微的嗡鸣声。\n\n' +
      '【你可以：探索房间 / 去厨房 / 去浴室 / 去卧室 / 检查身体状态】'
    );
  }
}

// ============================================================
//  事件绑定
// ============================================================
sendBtn.addEventListener('click', function() {
  const text = userInput.value.trim();
  if (text) sendMessage(text);
});

userInput.addEventListener('keypress', function(e) {
  if (e.key === 'Enter') {
    e.preventDefault();
    const text = userInput.value.trim();
    if (text) sendMessage(text);
  }
});

//  页面加载
// ============================================================
window.addEventListener('load', function() {
  if (!getApiKey()) {
    document.body.innerHTML = '<div style="color:#d44a6a;text-align:center;padding:40px;">❌ 需要有效的 API Key 才能启动游戏，请刷新页面重试。</div>';
    return;
  }

  const savedMode = localStorage.getItem('game_mode');
  if (savedMode && ['温柔之家','无尽热望','嫉妒之火','深渊邀请','欲望苗床'].includes(savedMode)) {
    gameState.mode = savedMode;
    modeSelect.value = savedMode;
    modeTag.textContent = '🌸 ' + savedMode;
  } else {
    gameState.mode = '温柔之家';
    modeSelect.value = '温柔之家';
    modeTag.textContent = '🌸 温柔之家';
  }

  const savedHistory = localStorage.getItem('conversation_history');
  if (savedHistory) {
    try {
      conversationHistory = JSON.parse(savedHistory);
      if (conversationHistory[0]?.role === 'system') {
        conversationHistory[0].content = buildSystemPrompt();
      } else {
        conversationHistory.unshift({ role: 'system', content: buildSystemPrompt() });
      }
      for (const msg of conversationHistory) {
        if (msg.role === 'user') appendMessage('user', msg.content);
        else if (msg.role === 'assistant') appendMessage('narrative', msg.content);
      }
    } catch(e) {
      conversationHistory = [{ role: 'system', content: buildSystemPrompt() }];
    }
  } else {
    conversationHistory = [{ role: 'system', content: buildSystemPrompt() }];
  }

  loadMemory();
  updateStatusDisplay();
  updateMemoryDisplay();

  if (messagesDiv.children.length === 0) {
    appendMessage('system', '🌸 游戏开始 · 模式：' + gameState.mode);
    appendMessage('system', '🧠 记忆系统已激活 · 点击「记忆」查看');
    appendMessage('narrative',
      '你站在客厅中央。\n\n' +
      '这栋房子很安静，安静得不正常。墙壁是温暖的米白色，沙发看起来柔软而诱人，空气中有一股若有若无的甜腥味。\n\n' +
      '你知道这里没有通往外界的门——除非它允许你离开。\n\n' +
      '脚下的地板微微发暖，仿佛在呼吸。远处，厨房的冰箱发出轻微的嗡鸣声。\n\n' +
      '【你可以：探索房间 / 去厨房 / 去浴室 / 去卧室 / 检查身体状态】'
    );
  }

  userInput.focus();
});
